<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="CarPlay square display showing NaviBeat list with playback bar">
  <defs>
    <linearGradient id="cp-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e1e1e"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="cp-row-art1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2a0f04"/><stop offset="1" stop-color="#E39B56"/></linearGradient>
    <linearGradient id="cp-row-art2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0a1a22"/><stop offset="1" stop-color="#2b7a78"/></linearGradient>
    <linearGradient id="cp-row-art3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#20102a"/><stop offset="1" stop-color="#7a4aa8"/></linearGradient>
    <linearGradient id="cp-row-art4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a1a08"/><stop offset="1" stop-color="#c9a03a"/></linearGradient>
    <linearGradient id="cp-row-art5" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#2a0a1a"/><stop offset="1" stop-color="#b24a8a"/></linearGradient>
    <clipPath id="cp-screen"><rect x="40" y="40" width="720" height="720" rx="24"/></clipPath>
  </defs>

  <!-- Dashboard frame -->
  <rect x="20" y="20" width="760" height="760" rx="36" fill="url(#cp-frame)"/>
  <rect x="40" y="40" width="720" height="720" rx="24" fill="#050505"/>

  <g clip-path="url(#cp-screen)" font-family="'Inter Tight', system-ui, sans-serif">
    <rect x="40" y="40" width="720" height="720" fill="#0a0a0a"/>
    <!-- Subtle warm glow -->
    <ellipse cx="400" cy="120" rx="420" ry="160" fill="#E39B56" fill-opacity="0.08"/>

    <!-- Left sidebar -->
    <rect x="40" y="40" width="96" height="720" fill="#111111"/>
    <rect x="136" y="40" width="1" height="720" fill="#ffffff" fill-opacity="0.08"/>

    <!-- Sidebar icons -->
    <g transform="translate(88 80)" fill="#E39B56">
      <rect x="-14" y="-14" width="28" height="28" rx="6"/>
      <text y="36" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" letter-spacing="1" fill="#E39B56">NAVI</text>
    </g>
    <g transform="translate(88 180)" fill="#a8a39a">
      <rect x="-14" y="-14" width="28" height="28" rx="6" fill="none" stroke="#a8a39a" stroke-width="2"/>
      <text y="36" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" letter-spacing="1" fill="#a8a39a">HOME</text>
    </g>
    <g transform="translate(88 280)" fill="#a8a39a">
      <circle r="14" fill="none" stroke="#a8a39a" stroke-width="2"/>
      <text y="36" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" letter-spacing="1" fill="#a8a39a">ALBUMS</text>
    </g>
    <g transform="translate(88 380)" fill="#a8a39a">
      <path d="M -12 -10 L 12 -10 M -12 0 L 12 0 M -12 10 L 12 10" stroke="#a8a39a" stroke-width="2" stroke-linecap="round"/>
      <text y="36" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" letter-spacing="1" fill="#a8a39a">SONGS</text>
    </g>
    <g transform="translate(88 480)" fill="#a8a39a">
      <rect x="-12" y="-12" width="24" height="24" rx="4" fill="none" stroke="#a8a39a" stroke-width="2"/>
      <text y="36" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" letter-spacing="1" fill="#a8a39a">MIXES</text>
    </g>
    <g transform="translate(88 580)" fill="#a8a39a">
      <circle r="12" fill="none" stroke="#a8a39a" stroke-width="2"/>
      <circle r="3" fill="#a8a39a"/>
      <text y="36" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="8" letter-spacing="1" fill="#a8a39a">SEARCH</text>
    </g>

    <!-- Main content header -->
    <g transform="translate(172 90)">
      <text fill="#E39B56" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="1.5">RECENTLY PLAYED</text>
      <text y="36" fill="#f2efe8" font-family="'Fraunces', Georgia, serif" font-weight="400" font-size="28" letter-spacing="-0.5">Back on the road.</text>
    </g>

    <!-- List rows -->
    <g transform="translate(172 190)" font-size="15">
      <g>
        <rect width="560" height="70" rx="12" fill="#E39B56" fill-opacity="0.14"/>
        <rect x="14" y="14" width="42" height="42" rx="6" fill="url(#cp-row-art1)"/>
        <text x="70" y="34" fill="#f2efe8" font-weight="500">Fade Into You</text>
        <text x="70" y="54" fill="#a8a39a" font-size="12">Mazzy Star · So Tonight That I Might See</text>
        <g transform="translate(512 35)" fill="#E39B56">
          <rect x="-3" y="-10" width="3" height="20"/>
          <rect x="4" y="-14" width="3" height="28"/>
          <rect x="11" y="-8" width="3" height="16"/>
        </g>
      </g>
      <g transform="translate(0 82)">
        <rect x="14" y="14" width="42" height="42" rx="6" fill="url(#cp-row-art2)"/>
        <text x="70" y="34" fill="#f2efe8" font-weight="500">Weird Fishes</text>
        <text x="70" y="54" fill="#a8a39a" font-size="12">Radiohead · In Rainbows</text>
      </g>
      <g transform="translate(0 164)">
        <rect x="14" y="14" width="42" height="42" rx="6" fill="url(#cp-row-art3)"/>
        <text x="70" y="34" fill="#f2efe8" font-weight="500">Pictures of You</text>
        <text x="70" y="54" fill="#a8a39a" font-size="12">The Cure · Disintegration</text>
      </g>
      <g transform="translate(0 246)">
        <rect x="14" y="14" width="42" height="42" rx="6" fill="url(#cp-row-art4)"/>
        <text x="70" y="34" fill="#f2efe8" font-weight="500">The Chain</text>
        <text x="70" y="54" fill="#a8a39a" font-size="12">Fleetwood Mac · Rumours</text>
      </g>
      <g transform="translate(0 328)">
        <rect x="14" y="14" width="42" height="42" rx="6" fill="url(#cp-row-art5)"/>
        <text x="70" y="34" fill="#f2efe8" font-weight="500">Running Up That Hill</text>
        <text x="70" y="54" fill="#a8a39a" font-size="12">Kate Bush · Hounds of Love</text>
      </g>
    </g>

    <!-- Now playing bar fixed bottom -->
    <rect x="136" y="672" width="624" height="88" fill="#0a0a0a"/>
    <rect x="136" y="672" width="624" height="1" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="172" y="692" width="48" height="48" rx="6" fill="url(#cp-row-art1)"/>
    <text x="236" y="712" fill="#f2efe8" font-size="15" font-weight="500">Fade Into You</text>
    <text x="236" y="732" fill="#a8a39a" font-size="12">Mazzy Star</text>
    <rect x="236" y="744" width="300" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.15"/>
    <rect x="236" y="744" width="120" height="3" rx="1.5" fill="#E39B56"/>
    <!-- Play -->
    <g transform="translate(700 716)" fill="#f2efe8">
      <circle r="22" fill="#f2efe8"/>
      <path d="M -6 -8 L -6 8 L 8 0 Z" fill="#0a0a0a"/>
    </g>
    <g transform="translate(650 716)" fill="#f2efe8" opacity="0.7">
      <path d="M 6 0 L -6 -8 L -6 8 Z"/>
      <rect x="-10" y="-8" width="2" height="16"/>
    </g>
    <g transform="translate(600 716)" fill="#f2efe8" opacity="0.7">
      <path d="M -6 0 L 6 -8 L 6 8 Z"/>
      <rect x="8" y="-8" width="2" height="16"/>
    </g>
  </g>
</svg>

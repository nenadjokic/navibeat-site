<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-label="15-inch MacBook Pro showing the NaviBeat Mac mini player">
  <defs>
    <linearGradient id="mb-screen-bezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="mb-hinge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="0.5" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#1f1f1f"/>
    </linearGradient>
    <linearGradient id="mb-base-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f2f2f"/>
      <stop offset="0.4" stop-color="#272727"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="mb-base-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#1e1e1e"/>
    </linearGradient>
    <linearGradient id="mb-art" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0d04"/>
      <stop offset="0.35" stop-color="#8a3a0a"/>
      <stop offset="0.7" stop-color="#E39B56"/>
      <stop offset="1" stop-color="#F5B877"/>
    </linearGradient>
    <radialGradient id="mb-art-vignette" cx="0.3" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#F5B877" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#120803" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="mb-drawer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161616" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#0c0c0c" stop-opacity="0.92"/>
    </linearGradient>
    <clipPath id="mb-screen-clip">
      <rect x="140" y="52" width="1120" height="704" rx="14"/>
    </clipPath>
    <clipPath id="mb-window-clip">
      <rect x="200" y="132" width="1000" height="578" rx="12"/>
    </clipPath>
  </defs>

  <!-- Lid shell -->
  <rect x="110" y="32" width="1180" height="744" rx="22" fill="#0a0a0a"/>
  <rect x="118" y="40" width="1164" height="728" rx="18" fill="url(#mb-screen-bezel)"/>

  <!-- Screen area (bezel + notch) -->
  <rect x="140" y="52" width="1120" height="704" rx="14" fill="#050505"/>
  <!-- Notch -->
  <rect x="660" y="52" width="80" height="18" rx="8" fill="#000"/>

  <g clip-path="url(#mb-screen-clip)">
    <!-- Desktop wallpaper — deep warm gradient -->
    <rect x="140" y="52" width="1120" height="704" fill="#0a0a0a"/>
    <rect x="140" y="52" width="1120" height="704" fill="url(#mb-art-vignette)" opacity="0.45"/>

    <!-- Faint menu bar -->
    <rect x="140" y="52" width="1120" height="28" fill="#000" opacity="0.55"/>
    <circle cx="162" cy="66" r="5" fill="#f2efe8" opacity="0.55"/>
    <rect x="175" y="62" width="60" height="8" rx="2" fill="#f2efe8" opacity="0.45"/>
    <rect x="1160" y="62" width="40" height="8" rx="2" fill="#f2efe8" opacity="0.35"/>
    <rect x="1210" y="62" width="30" height="8" rx="2" fill="#f2efe8" opacity="0.35"/>

    <!-- NaviBeat window -->
    <g clip-path="url(#mb-window-clip)">
      <rect x="200" y="132" width="1000" height="578" fill="#0a0a0a"/>

      <!-- Left half: edge-to-edge album art -->
      <rect x="200" y="132" width="500" height="578" fill="url(#mb-art)"/>
      <rect x="200" y="132" width="500" height="578" fill="url(#mb-art-vignette)" opacity="0.55"/>
      <!-- Subtle record grooves -->
      <g stroke="#ffffff" stroke-opacity="0.06" fill="none">
        <circle cx="350" cy="420" r="190"/>
        <circle cx="350" cy="420" r="150"/>
        <circle cx="350" cy="420" r="115"/>
        <circle cx="350" cy="420" r="82"/>
        <circle cx="350" cy="420" r="50"/>
      </g>
      <circle cx="350" cy="420" r="16" fill="#0a0a0a"/>
      <circle cx="350" cy="420" r="5" fill="#E39B56"/>

      <!-- Window chrome (traffic lights over art) -->
      <circle cx="226" cy="158" r="7" fill="#ff5f57"/>
      <circle cx="250" cy="158" r="7" fill="#febc2e"/>
      <circle cx="274" cy="158" r="7" fill="#28c840"/>

      <!-- Track metadata overlay on art -->
      <text x="224" y="642" fill="#f2efe8" font-family="'Fraunces', Georgia, serif" font-style="italic" font-weight="300" font-size="30">Fade Into You</text>
      <text x="224" y="670" fill="#f2efe8" opacity="0.72" font-family="'Inter Tight', system-ui, sans-serif" font-size="14">Mazzy Star — So Tonight That I Might See</text>

      <!-- Right half: frosted drawer -->
      <rect x="700" y="132" width="500" height="578" fill="url(#mb-drawer)"/>
      <!-- Drawer tabs -->
      <rect x="730" y="164" width="72" height="28" rx="8" fill="#E39B56" fill-opacity="0.15" stroke="#E39B56" stroke-opacity="0.45"/>
      <text x="766" y="183" text-anchor="middle" fill="#E39B56" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="1.2">UP NEXT</text>
      <rect x="814" y="164" width="60" height="28" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="844" y="183" text-anchor="middle" fill="#a8a39a" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="11" letter-spacing="1.2">LYRICS</text>

      <!-- Queue rows -->
      <g font-family="'Inter Tight', system-ui, sans-serif">
        <g transform="translate(730 220)">
          <rect width="440" height="52" rx="8" fill="#E39B56" fill-opacity="0.08"/>
          <rect x="10" y="10" width="32" height="32" rx="4" fill="#E39B56" fill-opacity="0.3"/>
          <text x="54" y="22" fill="#f2efe8" font-size="13" font-weight="500">Into Dust</text>
          <text x="54" y="40" fill="#a8a39a" font-size="11">Mazzy Star · 3:52</text>
          <rect x="400" y="20" width="20" height="12" rx="2" fill="#E39B56"/>
        </g>
        <g transform="translate(730 282)">
          <rect x="10" y="10" width="32" height="32" rx="4" fill="#f2efe8" fill-opacity="0.12"/>
          <text x="54" y="22" fill="#f2efe8" font-size="13" font-weight="500">Blue Flower</text>
          <text x="54" y="40" fill="#a8a39a" font-size="11">Mazzy Star · 3:39</text>
        </g>
        <g transform="translate(730 334)">
          <rect x="10" y="10" width="32" height="32" rx="4" fill="#f2efe8" fill-opacity="0.12"/>
          <text x="54" y="22" fill="#f2efe8" font-size="13" font-weight="500">Mary of Silence</text>
          <text x="54" y="40" fill="#a8a39a" font-size="11">Mazzy Star · 6:24</text>
        </g>
        <g transform="translate(730 386)">
          <rect x="10" y="10" width="32" height="32" rx="4" fill="#f2efe8" fill-opacity="0.12"/>
          <text x="54" y="22" fill="#f2efe8" font-size="13" font-weight="500">Five String Serenade</text>
          <text x="54" y="40" fill="#a8a39a" font-size="11">Mazzy Star · 4:33</text>
        </g>
        <g transform="translate(730 438)">
          <rect x="10" y="10" width="32" height="32" rx="4" fill="#f2efe8" fill-opacity="0.12"/>
          <text x="54" y="22" fill="#f2efe8" font-size="13" font-weight="500">Flowers in December</text>
          <text x="54" y="40" fill="#a8a39a" font-size="11">Mazzy Star · 5:01</text>
        </g>
      </g>

      <!-- Transport bar -->
      <rect x="224" y="592" width="452" height="86" rx="12" fill="#000" fill-opacity="0.55"/>
      <!-- Progress -->
      <rect x="240" y="634" width="420" height="3" rx="1.5" fill="#ffffff" fill-opacity="0.15"/>
      <rect x="240" y="634" width="172" height="3" rx="1.5" fill="#E39B56"/>
      <circle cx="412" cy="635.5" r="5" fill="#E39B56"/>
      <text x="240" y="657" fill="#a8a39a" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10">1:54</text>
      <text x="660" y="657" fill="#a8a39a" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="10" text-anchor="end">4:46</text>
      <!-- Controls -->
      <g fill="#f2efe8" transform="translate(384 606)">
        <path d="M 0 0 L 12 -8 L 12 8 Z" opacity="0.85"/>
        <circle cx="42" cy="0" r="14" fill="#f2efe8"/>
        <path d="M 38 -5 L 38 5 L 46 0 Z" fill="#0a0a0a"/>
        <path d="M 84 0 L 72 -8 L 72 8 Z" opacity="0.85"/>
      </g>
    </g>
    <!-- Window border -->
    <rect x="200" y="132" width="1000" height="578" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <!-- Screen outline highlight -->
  <rect x="140" y="52" width="1120" height="704" rx="14" fill="none" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Hinge / base -->
  <path d="M 80 776 L 1320 776 L 1300 810 L 100 810 Z" fill="url(#mb-hinge)"/>
  <rect x="100" y="810" width="1200" height="42" rx="4" fill="url(#mb-base-top)"/>
  <!-- Keyboard well shadow -->
  <rect x="580" y="810" width="240" height="12" rx="6" fill="#000" opacity="0.55"/>
  <!-- Foot/front lip -->
  <path d="M 100 852 L 1300 852 L 1260 874 L 140 874 Z" fill="url(#mb-base-front)"/>
  <rect x="620" y="854" width="160" height="4" rx="2" fill="#000" opacity="0.5"/>
</svg>
